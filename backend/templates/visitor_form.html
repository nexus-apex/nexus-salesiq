{% extends "base.html" %}
{% block title %}{% if editing %}Edit{% else %}New{% endif %} Visitor | NexusSalesIQ{% endblock %}
{% block page_title %}{% if editing %}Edit Visitor{% else %}New Visitor{% endif %}{% endblock %}
{% block content %}
<div class="card" style="max-width:750px">
  <form method="post">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label>Name</label>
        <input type="text" name="name" value="{{ record.name|default:'' }}">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ record.email|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Page Url</label>
        <input type="url" name="page_url" value="{{ record.page_url|default:'' }}">
      </div>
      <div class="form-group">
        <label>Country</label>
        <input type="text" name="country" value="{{ record.country|default:'' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Browser</label>
        <input type="text" name="browser" value="{{ record.browser|default:'' }}">
      </div>
      <div class="form-group">
        <label>Visits</label>
        <input type="number" name="visits" value="{{ record.visits|default:'0' }}">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select name="status">
          <option value="online" {% if record.status == 'online' %}selected{% endif %}>Online</option>
          <option value="offline" {% if record.status == 'offline' %}selected{% endif %}>Offline</option>
          <option value="away" {% if record.status == 'away' %}selected{% endif %}>Away</option>
        </select>
      </div>
      <div class="form-group">
        <label>Last Seen</label>
        <input type="date" name="last_seen" value="{{ record.last_seen|date:'Y-m-d'|default:'' }}">
      </div>
    </div>

    <div style="display:flex;gap:0.75rem;margin-top:1rem">
      <button type="submit" class="btn btn-primary">{% if editing %}Update{% else %}Create{% endif %} Visitor</button>
      <a href="/visitors/" class="btn" style="background:var(--border);color:var(--text)">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
